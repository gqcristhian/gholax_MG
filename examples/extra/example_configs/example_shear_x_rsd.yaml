theory:
  ExpansionHistory:
    use_emulator: False
    emulator_file_names: 
      chi_z: aemulus_nu_tier1_cosmo_only_heft_chiz_emu
      e_z: aemulus_nu_tier1_cosmo_only_heft_ez_emu

  LinearGrowth:
    use_emulator: True
    emulator_file_name: 'aemulus_nu_tier1_cosmo_only_heft_sigma8z_emu'

  LinearGrowthRate:
    use_emulator: True
    use_boltzmann: False 
    emulator_file_name: 'aemulus_nu_tier1_cosmo_only_f_z_emu'    

  RealSpaceMatterPowerSpectrum:
    use_emulator: True
    emulator_file_names: emu_config_dst_irresum.yaml

  RealSpaceBiasedTracerSpectra:
    bias_model: heft #as opposed to CLEFT/linear bias
    use_emulator: True
    emulator_file_names: emu_config_dst_irresum.yaml

  RealSpaceBiasExpansion:
    baryon_z_evolution_model : spline
    p_mm_ct_order : 1
    p_mm_ct_pade: True
    spline_N: 2
    spline_Delta: 1.2
    bias_model: heft
    scale_by_s8z: True
    p_mm_uv_behavior: dmo
  
  DensityShapeIA:
    use_emulator: True
    heft_nla: False
    emulator_file_names: 'emu_p_density_shape.yaml'

  ShapeShapeIA:
    use_emulator: True
    heft_nla: False
    emulator_file_names: 
     - emu_p0_shape_shape.yaml
     - emu_p1_shape_shape.yaml 
     - emu_p2_shape_shape.yaml

  RealSpaceIAExpansion:
    z_evolution_model : spline
    spline_N: 2
    spline_Delta: 1.5
    scale_by_s8z: True
    include_magnification_x_ia: True
    no_ia: True
  
  RedshiftSpaceBiasedTracerSpectra:
    use_emulator: True
    emulator_file_names:
      - emu_pk0.yaml
      - emu_pk2.yaml
      - emu_pk4.yaml
      - emu_pk6.yaml
  
projection:
  k_cutoff: 1.0
  LensingCounterterm:
    lensing_counterterm_order: 3
    mean_model: dmo

  Limber:
    k_cutoff: None

sampler:
  {'NUTS': {'n_steps_warmup': 500, 'n_incr': 50, 'target_r_minus_one': 0.1, 'random_start': False, 'minimize_and_sample': True, 'n_steps_min': 2000}}

output_file: example_shear_x_rsd_NUTS.txt
  



    